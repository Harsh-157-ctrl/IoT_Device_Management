<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Command Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container mt-5">
    <h2 class="mb-4 text-primary">🛰️ IoT Command & Control</h2>
    
    <div class="row">
        <div class="col-md-6 mb-4">
            <div class="card bg-secondary text-light">
                <div class="card-header border-light">
                    <h5 class="mb-0">Live Devices</h5>
                </div>
                <div class="card-body" id="device-list">
                    <p class="text-muted">Waiting for devices to connect...</p>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card bg-secondary text-light">
                <div class="card-header border-light">
                    <h5 class="mb-0">Send Command</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Target Device</label>
                        <select id="targetSelect" class="form-select bg-dark text-light border-light">
                            <option value="all">All Devices</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Action / Command</label>
                        <input type="text" id="actionInput" class="form-control bg-dark text-light border-light" placeholder="e.g., reboot, turn_on_motor">
                    </div>
                    <button class="btn btn-primary w-100" onclick="sendCommand()">Execute Command</button>
                    
                    <div id="alertBox" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. Function to fetch status from the Python backend
    async function fetchStatus() {
        try {
            const response = await fetch('/api/status');
            const data = await response.json();
            
            const deviceList = document.getElementById('device-list');
            const targetSelect = document.getElementById('targetSelect');
            
            // Save current dropdown selection so it doesn't reset when UI updates
            const currentSelection = targetSelect.value;
            
            if (Object.keys(data).length === 0) {
                deviceList.innerHTML = '<p class="text-warning">No devices currently connected.</p>';
                targetSelect.innerHTML = '<option value="all">All Devices</option>';
                return;
            }

            // Build the HTML for the device list and dropdown
            let html = '';
            let dropdownHtml = '<option value="all">All Devices</option>';
            
            for (const [deviceId, info] of Object.entries(data)) {
                html += `
                    <div class="alert alert-dark border-light mb-2">
                        <strong>${deviceId}</strong><br>
                        <small class="text-success">${info.status}</small><br>
                        <small class="text-muted">Last seen: ${info.last_seen}</small>
                    </div>
                `;
                dropdownHtml += `<option value="${deviceId}">${deviceId}</option>`;
            }
            
            deviceList.innerHTML = html;
            targetSelect.innerHTML = dropdownHtml;
            targetSelect.value = currentSelection; // Restore selection

        } catch (error) {
            console.error("Error fetching status:", error);
        }
    }

    // 2. Function to send commands back to Python
    async function sendCommand() {
        const target = document.getElementById('targetSelect').value;
        const action = document.getElementById('actionInput').value;
        const alertBox = document.getElementById('alertBox');

        if (!action) {
            alertBox.innerHTML = '<div class="alert alert-danger py-2">Please enter an action.</div>';
            return;
        }

        try {
            const response = await fetch('/api/command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ target: target, action: action })
            });
            const result = await response.json();
            
            if (response.ok) {
                alertBox.innerHTML = `<div class="alert alert-success py-2">${result.success}</div>`;
                document.getElementById('actionInput').value = ''; // clear input
            } else {
                alertBox.innerHTML = `<div class="alert alert-danger py-2">${result.error}</div>`;
            }
        } catch (error) {
            alertBox.innerHTML = `<div class="alert alert-danger py-2">Failed to reach server.</div>`;
        }
        
        // Hide alert after 3 seconds
        setTimeout(() => { alertBox.innerHTML = ''; }, 3000);
    }

    // Refresh device list every 2 seconds
    setInterval(fetchStatus, 2000);
    fetchStatus(); // Run once immediately on load
</script>
</body>
</html>
